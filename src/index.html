<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAgents</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans">
    <header class="w-full py-6 px-4 bg-white shadow-md">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-6 nav">
          <a aria-label="Home" href="#"
            ><img
              alt="OpenAgents"
              fetchpriority="high"
              width="109"
              height="40"
              decoding="async"
              data-nimg="1"
              class="h-10 w-auto"
              style="color: transparent"
              src="static/assets/logo.png"
          /></a>
          <nav class="space-x-6">
            <a href="#" class="text-gray-600 hover:text-gray-900">Features</a>
            <a href="#" class="text-gray-600 hover:text-gray-900">Networks</a>
            <a href="#" class="text-gray-600 hover:text-gray-900">Web Client</a>
          </nav>
        </div>
        <div class="space-x-6 actions">
          <a href="#" class="text-gray-600 hover:text-gray-900"
            >Documentation</a
          >
          <a href="#" class="button">Get started now</a>
        </div>
      </div>
    </header>
    <main
      class="flex flex-col items-center text-center space-y-6 py-16 min-h-[calc(100vh-96px)] justify-center"
    >
      <h1 class="text-5xl font-bold text-gray-900">OpenAgents</h1>
      <p class="text-lg text-gray-600 max-w-md">
        An open framework for connecting AI agents at scale.
      </p>
      <a
        href="https://github.com/openagentsfoundation/openagents-sdk"
        class="bg-blue-700 text-white px-6 py-2 rounded-full no-underline hover:bg-blue-900"
        >View on GitHub</a
      >
      <p class="text-sm text-gray-500">
        Compatible with leading AI and agent frameworks
      </p>
    </main>
  </body>
</html>
